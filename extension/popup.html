<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>CRM WhatsApp</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 280px;
  background: #111b21;
  color: #e9edef;
  font-family: 'Segoe UI', sans-serif;
  font-size: 13px;
}
.header {
  background: linear-gradient(135deg, #005c4b, #00a884);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.header-title { font-size: 15px; font-weight: 700; color: white; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; }
.section { padding: 14px 16px; border-bottom: 1px solid #1e2d35; }
.section-label {
  font-size: 10px;
  font-weight: 700;
  color: #8696a0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #00a884;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.status-text { font-size: 12px; color: #00a884; font-weight: 600; }
.btn-main {
  width: 100%;
  padding: 11px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  background: #00a884;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  margin-bottom: 8px;
}
.btn-main:hover { background: #00c49a; }
.btn-secondary {
  width: 100%;
  padding: 9px;
  border-radius: 10px;
  border: 1px solid #2a3942;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  color: #8696a0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  margin-bottom: 6px;
  text-decoration: none;
}
.btn-secondary:hover { background: #1f2c34; color: #e9edef; border-color: #374d5b; }
.info-box {
  background: #1f2c34;
  border: 1px solid #2a3942;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 11px;
  color: #8696a0;
  line-height: 1.5;
}
.info-box strong { color: #00a884; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚖️</div>
  <div>
    <div class="header-title">CRM WhatsApp</div>
    <div class="header-sub">Ramon Pacheco Advocacia</div>
  </div>
</div>

<div class="section">
  <div class="section-label">Status</div>
  <div class="status-row">
    <div class="status-dot"></div>
    <span class="status-text">Extensão ativa</span>
  </div>
</div>

<div class="section">
  <div class="section-label">Ações</div>
  <button class="btn-main" id="btn-toggle">
    <span>📋</span> Ativar / Desativar Kanban
  </button>
  <button class="btn-main" id="btn-refresh" style="background:#1f2c34; color:#00a884; border:1px solid #00a88444;">
    <span>↻</span> Atualizar Leads
  </button>
</div>

<div class="section">
  <div class="section-label">Sistema Web</div>
  <a class="btn-secondary" href="https://escritorio-ramon.vercel.app" target="_blank">
    🌐 Abrir Painel Principal
  </a>
</div>

<div class="section" style="border-bottom: none;">
  <div class="info-box">
    <strong>Como usar:</strong><br>
    Abra o WhatsApp Web e o CRM será ativado automaticamente. Use o seletor de etapa em cada card para mover o lead no funil.
  </div>
</div>

<script>
document.getElementById('btn-toggle').addEventListener('click', () => {
  chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
    chrome.tabs.sendMessage(tabs[0].id, { action: 'togglePanel' });
  });
});
document.getElementById('btn-refresh').addEventListener('click', () => {
  chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
    chrome.tabs.sendMessage(tabs[0].id, { action: 'refreshLeads' });
  });
});
</script>

</body>
</html>
